# configs/data_split.yaml
# =======================
# Fold definitions for LODO cross-validation.
# No changes should be here.

processed_dir: data/processed/UAH-DRIVESET-v1
ready_dir: data/ready/UAH-DRIVESET-v1

folds:
  - { fold: 1, test: D1, train: [D2, D3, D4, D5, D6] }
  - { fold: 2, test: D2, train: [D1, D3, D4, D5, D6] }
  - { fold: 3, test: D3, train: [D1, D2, D4, D5, D6] }
  - { fold: 4, test: D4, train: [D1, D2, D3, D5, D6] }
  - { fold: 5, test: D5, train: [D1, D2, D3, D4, D6] }
  - { fold: 6, test: D6, train: [D1, D2, D3, D4, D5] }

shuffle_seed: 42
