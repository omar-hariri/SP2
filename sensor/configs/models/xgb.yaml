# configs/xgb.yaml
wandb:
  project: SP2
  experiment_name: XGB_LODO_CV
  entity: omarhariri-syrian-private-university

model:
  n_estimators: 200
  max_depth: 6
  learning_rate: 0.1
  subsample: 0.8
  colsample_bytree: 0.8
  objective: "binary:logistic"
  scale_pos_weight: 3
  random_state: 42
  n_jobs: -1

output:
  class_names: ["NON_AGGRESSIVE", "AGGRESSIVE"]
